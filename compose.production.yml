name: raven-url-shortener

services:
    cache:
        init: true
        image: valkey/valkey:8
        restart: unless-stopped
        command: >
            --requirepass ${CACHE_PASSWORD}
            --maxmemory 128mb
            --maxmemory-policy allkeys-lru
        volumes:
            - valkey_data:/data
        environment:
            TZ: ${APP_TIMEZONE}
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: valkey-cli --raw incr ping
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 16
                    cpus: "0.5"
                    memory: 128M

    database:
        init: true
        image: postgres:18
        restart: unless-stopped
        volumes:
            - postgres_data:/var/lib/postgresql/18/docker
        environment:
            TZ: ${APP_TIMEZONE}
            POSTGRES_DB: ${DATABASE_NAME}
            POSTGRES_USER: ${DATABASE_USERNAME}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: pg_isready --dbname=${DATABASE_NAME} --username=${DATABASE_USERNAME}
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 64
                    cpus: "0.5"
                    memory: 256M

    docs:
        init: true
        image: swaggerapi/swagger-ui:latest
        restart: unless-stopped
        cap_drop:
            - ALL
        depends_on:
            server:
                condition: service_healthy
        environment:
            URL: http://server:8000/openapi.json
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: wget -O - http://127.0.0.1:8080/
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 16
                    cpus: "0.5"
                    memory: 128M

    proxy:
        init: true
        image: varnish:8-alpine
        restart: unless-stopped
        volumes:
            - ./docker/varnish.vcl:/etc/varnish/default.vcl:ro # TODO : à modifier
        cap_drop:
            - ALL
        depends_on:
            client:
                condition: service_healthy
        environment:
            VARNISH_SIZE: 128m
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: wget -O - http://localhost/
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 1024
                    cpus: "0.5"
                    memory: 256M
        ports:
            - "${PORT:-80}:80"

    client:
        init: true
        user: "${UID:-1000}:${GID:-1000}"
        # image: registry.florian-dev.fr:443/floriantrayon/raven-url-shortener-ui:${VERSION:-latest}
        image: raven-url-shortener-ui # TODO : à modifier
        restart: unless-stopped
        command: npm run start
        cap_drop:
            - ALL
        environment:
            PORT: 3000
        depends_on:
            server:
                condition: service_healthy
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: wget -O - http://localhost:3000/
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 64
                    cpus: "1"
                    memory: 512M
        build:
            target: production
            context: ./client
            dockerfile: ./docker/Dockerfile

    server:
        init: true
        user: "${UID:-1000}:${GID:-1000}"
        # image: registry.florian-dev.fr:443/floriantrayon/raven-url-shortener-api:${VERSION:-latest}
        image: raven-url-shortener-api # TODO : à modifier
        restart: unless-stopped
        command: docker/scripts/production/entrypoint.sh
        volumes:
            - ./logs:/usr/src/app/logs
        cap_drop:
            - ALL
        depends_on:
            cache:
                condition: service_healthy
            database:
                condition: service_healthy
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: curl -f http://localhost:8080/
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 64
                    cpus: "1"
                    memory: 128M
        build:
            target: production
            context: ./server
            dockerfile: ./docker/Dockerfile

volumes:
    valkey_data:
    postgres_data:
